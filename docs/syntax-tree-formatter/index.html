<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syntax Tree Formatter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <p><a href="..">back</a></p>
    <h1>Syntax Tree Formatter</h1>
    <textarea id="input" placeholder="Enter a syntax tree expression, e.g. [category [category item] [category [category item]]]"></textarea>
    <div class="buttons">
      <button id="format-btn">Format</button>
      <button id="unformat-btn">Unformat</button>
      <button id="select-btn">Select Block</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
