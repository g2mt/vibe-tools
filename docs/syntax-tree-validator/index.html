<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Syntax Tree Validator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <p><a href="..">back</a></p>
  <h1>Syntax Tree Validator</h1>
  <div id="input-area">
    <textarea id="tree-input" rows="4" cols="80">[TP [NP This] [T' [T pres] [VP [V' [V is] [DP [D' [D a] [NP [N' [N wug]]]]]]]]]</textarea>
    <br/>
    <label><input type="checkbox" id="phrase-only-check" checked> Show only phrase-level constituents</label>
    <br/>
    <label><input type="checkbox" id="hide-words-check" checked> Hide word-level constituents</label>
    <br/>
    <button id="parse-btn">Parse</button>
  </div>
  <div id="output-area"></div>
  <script src="script.js"></script>
</body>
</html>
